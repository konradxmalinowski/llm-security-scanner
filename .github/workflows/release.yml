name: Release to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          pip install --no-cache-dir build
          python -m build

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pyproject.toml version $PKG_VERSION" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for PyPI trusted publishing (OIDC) — no API token secret needed
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  docker-publish:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Wait for package to be available on PyPI
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          URL="https://pypi.org/pypi/llm-security-scanner/${TAG_VERSION}/json"
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null "$URL"; then
              echo "llm-security-scanner==${TAG_VERSION} is available on PyPI"
              exit 0
            fi
            echo "Attempt $i: ${TAG_VERSION} not yet indexed on PyPI, retrying in 2s..."
            sleep 2
          done
          echo "Timed out waiting for llm-security-scanner==${TAG_VERSION} to appear on PyPI" >&2
          exit 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch Docker image
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          IMAGE="ghcr.io/konradxmalinowski/llm-security-scanner"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg SCANNER_VERSION="$TAG_VERSION" \
            -f docker/Dockerfile \
            -t "$IMAGE:$TAG_VERSION" \
            -t "$IMAGE:latest" \
            --push \
            .
