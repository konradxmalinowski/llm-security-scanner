name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # CodeQL best practice: catch newly-disclosed vulnerable code patterns
    # even when no new commits land. Only the codeql job runs on this trigger.
    - cron: '0 3 * * 1'

jobs:
  sca:
    name: Dependency vulnerability scan (SCA)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install project dependencies
        run: uv pip install -e . --system

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit

  secret-scan:
    name: Secret scanning (gitleaks)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history is required so gitleaks can scan the complete diff
          # for push/PR events, not just the latest commit.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          # Required since gitleaks-action's breaking update: PR scans fetch the
          # diff via the GitHub API and fail fast without this token.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL analysis (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ['python']
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Query suite and demo/tests exclusions live in the config file.
          config-file: .github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
