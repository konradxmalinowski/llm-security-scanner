stages:
  - test

llm-security-scan:
  stage: test
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    LLM_ENDPOINT: "http://app:5000/chat"
    OLLAMA_HOST: "http://your-ollama-host:11434"
    LLM_JUDGE_MODEL: "llama3.2:3b"
    LLM_FAIL_ON_SCORE: "7.0"
    LLM_SEVERITY: ""
    LLM_CATEGORIES: ""
    LLM_INCLUDE_DOS_TESTS: "false"
  before_script:
    - docker build -t llm-security-scanner .
  script:
    - |
      set -eu
      test -n "$LLM_ENDPOINT" || {
        echo "Set LLM_ENDPOINT to the URL reachable from this job, for example http://app:5000/chat or http://localhost:5000/chat" >&2
        exit 1
      }

      ARGS="
        --target $LLM_ENDPOINT
        --target-type url
        --judge-model $LLM_JUDGE_MODEL
        --format json,html,sarif
        --output-dir /reports
        --fail-on-score $LLM_FAIL_ON_SCORE
      "

      if [ -n "${LLM_API_KEY:-}" ]; then
        ARGS="$ARGS --api-key ${LLM_API_KEY}"
      fi
      if [ -n "$LLM_SEVERITY" ]; then
        ARGS="$ARGS --severity $LLM_SEVERITY"
      fi
      if [ -n "$LLM_CATEGORIES" ]; then
        ARGS="$ARGS --categories $LLM_CATEGORIES"
      fi
      if [ "$LLM_INCLUDE_DOS_TESTS" = "true" ]; then
        ARGS="$ARGS --include-dos-tests"
      fi

      mkdir -p reports
      sh -c "docker run --rm -e OLLAMA_HOST=\"$OLLAMA_HOST\" -v \"$CI_PROJECT_DIR/reports:/reports\" llm-security-scanner $ARGS"
  artifacts:
    when: always
    paths:
      - reports/
