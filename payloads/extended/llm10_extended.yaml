category: "LLM10"
name: "Unbounded Consumption (Extended — Aggressive DoS Probes)"
severity: "low"
description: "Aggressive token-flooding and context-amplification payloads that simulate denial-of-service attacks on LLM endpoints. These payloads are opt-in via --include-dos-tests and must never run against production systems without explicit written authorization."

